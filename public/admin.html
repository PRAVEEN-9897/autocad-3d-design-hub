<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
</head>
<body>

    <h1>Admin Panel</h1>

    <h3>Upload PDF Notes</h3>

    <form
        action="/upload-note"
        method="POST"
        enctype="multipart/form-data"
    >

        <input
            type="file"
            name="pdf"
            accept=".pdf"
            required
        >

        <button type="submit">
            Upload PDF
        </button>

    </form>
    <h2>Add Course</h2>

<form action="/upload-course" method="POST">

    <input type="text"
           name="title"
           placeholder="Course Title"
           required>

    <br><br>

    <textarea
        name="description"
        placeholder="Description">
    </textarea>

    <br><br>

    <input type="number"
           name="price"
           placeholder="Price">

    <br><br>

    <input type="text"
           name="videoLink"
           placeholder="YouTube Video Link">

    <br><br>

    <button type="submit">
        Save Course
    </button>

</form>

</body>
</html>
